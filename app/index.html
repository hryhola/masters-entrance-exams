<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Персональний тренажер підготовки до вступних іспитів у магістратуру 2026 року."
    />
    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    />
    <meta
      name="googlebot"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    />
    <meta name="theme-color" content="#f4f3ed" />
    <script>
      try {
        const keys = ['masters-exams:v3:settings', 'masters-exams:v2:settings']
        const raw = keys.map((key) => localStorage.getItem(key)).find(Boolean)
        const theme = raw ? JSON.parse(raw).data?.theme : 'system'

        if (theme === 'light' || theme === 'dark') {
          document.documentElement.dataset.theme = theme
        }
      } catch {
        // The application will fall back to the system theme.
      }
    </script>
    <title>Вступ 2026</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
