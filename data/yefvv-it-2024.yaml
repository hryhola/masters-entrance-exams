- id: yefvv-it-2024-104
  number: 104
  type: single_choice
  prompt:
  - type: markdown
    text: Як розпочинається розбиття вхідного масиву А на підмасиви під час роботи
      методу швидкого сортування (Quick Sort)?
  options:
  - id: a
    content:
    - type: markdown
      text: Вибір випадкового (опорного) елемента. Після чого всі елементи менші за
        опорний елемент переміщаються у лівий підмасив, а всі більші ‒ в правий.
  - id: b
    content:
    - type: markdown
      text: Вибір випадкового (опорного) елемента. Після чого масив A розбивається
        на два підмасиви. Лівий підмасив містить усі елементи включно з опорним, правий
        – решту елементів.
  - id: c
    content:
    - type: markdown
      text: Вибір двох підмасивів. Лівий підмасив містить усі елементи до опорного
        елемента, а правий – решту елементів включно з опорним елементом.
  - id: d
    content:
    - type: markdown
      text: Розбиття масиву A на два підмасиви однакової розмірності. Після чого в
        кожному з них здійснюється вибір випадкового (опорного) елемента.
  answer:
    correct_option: a
    source: official_marker
  explanation:
    status: completed
    summary:
    - type: markdown
      text: Quicksort обирає опорний елемент і розділяє масив так, щоб менші елементи
        опинилися з одного боку, а більші — з іншого, після чого рекурсивно сортує
        частини.
    option_feedback:
