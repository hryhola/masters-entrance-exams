      verdict: correct
      blocks:
      - type: markdown
        text: Quicksort обирає опорний елемент і розділяє масив так, щоб менші елементи
          опинилися з одного боку, а більші — з іншого, після чого рекурсивно сортує
          частини.
    - option_id: b
      verdict: incorrect
      blocks:
      - type: markdown
        text: Опорний елемент не повинен обов’язково входити до лівого підмасиву в
          описаний спосіб.
    - option_id: c
