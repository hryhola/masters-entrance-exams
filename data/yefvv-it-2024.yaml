- id: yefvv-it-2024-051
  number: 51
  type: single_choice
  prompt:
  - type: markdown
    text: 'Потрібно запрограмувати сховище даних – стек, членами класу якого є:'
  - type: markdown
    text: "//дані-члени; //конструктор; //деструктор та //функції-члени інтерфейсу
      стека"
  - type: code
    language: cpp
    text: |-
      class IntStack
      {
      private:
          int *p;
          int size, num;
      public:
          IntStack (int);
          ~IntStack(void);
          void Push(int);
          int Get(void);
      };
    source_images:
    - sources/yefvv-it-2024/embedded-images/image-017.png
  - type: markdown
    text: Який опис відповідає деструктору класу?
  options:
  - id: a
    content:
    - type: code
      language: cpp
      text: |-
        IntStack::IntStack(int s)
        {
            p = new int[s];
            size = s;
            num = 0;
        }
      source_images:
      - sources/yefvv-it-2024/embedded-images/image-013.png
  - id: b
    content:
    - type: code
      language: cpp
      text: |-
        IntStack::~IntStack(void)
        {
            delete []p;
        }
      source_images:
      - sources/yefvv-it-2024/embedded-images/image-016.png
  - id: c
    content:
    - type: code
      language: cpp
      text: |-
        void IntStack::Push(int elem)
        {
            if (num < size) //контроль переповнювання стека
            {
                p[num] = elem;
                num++; //лічильник кількості збережених елементів у стеку
            }
        }
      source_images:
      - sources/yefvv-it-2024/embedded-images/image-014.png
  - id: d
    content:
    - type: code
      language: cpp
      text: |-
        int IntStack::Get(void)
        {
            if (num < 1) return 0;
            num--; return p[num];
        }
      source_images:
      - sources/yefvv-it-2024/embedded-images/image-015.png
  answer:
    correct_option: b
    source: official_marker
  explanation:
    status: completed
    summary:
    - type: markdown
      text: Деструктор C++ має ім’я класу з префіксом ~ і звільняє ресурс, виділений
        конструктором; це фрагмент IntStack::~IntStack із delete[].
